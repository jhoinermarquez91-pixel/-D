<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LO HIZO CHATGPT</title>
<style>
body {
    background-color: #0d0d0d;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: #00ff99;
}
#chat {
    width: 100%;
    max-width: 500px;
    height: 450px;
    background-color: #111;
    padding: 10px;
    overflow-y: auto;
    border: 2px solid #00ff99;
    margin-bottom: 10px;
    border-radius: 10px;
    white-space: pre-wrap;
}
.user {
    color: #00bfff;
    text-align: right;
    margin: 5px 0;
}
.bot {
    text-align: left;
    margin: 5px 0;
    white-space: pre-wrap;
}
input, button {
    padding: 10px;
    margin: 2px;
    border-radius: 5px;
    border: none;
    font-family: monospace;
    font-size: 16px;
}
input { width: 300px; }
button {
    background-color: #00ff99;
    color: #0d0d0d;
    cursor: pointer;
}
button:hover { background-color: #00cc77; }
</style>
</head>
<body>

<h2>TE GUSTA EL PITO?</h2>
<div id="chat"></div>
<input id="inputUser" placeholder="SI o NO">
<button onclick="preguntar()">Enviar</button>

<script>
let resp = "";
let noCount = 0;
let mentirosoDeMierdDone = false;
let dedoMostrado = false;
const chatDiv = document.getElementById("chat");

function randomBrightRGB() {
    const r = Math.floor(Math.random()*128 + 128);
    const g = Math.floor(Math.random()*128 + 128);
    const b = Math.floor(Math.random()*128 + 128);
    return `rgb(${r},${g},${b})`;
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.innerText = text;
    div.className = type;
    if(type === "bot") div.style.color = randomBrightRGB();
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function preguntar() {
    let input = document.getElementById("inputUser").value.trim();
    if(input === "") return;
    addMessage(" " + input, "user");
    
    resp = input.toLowerCase();

    if(resp.includes("si")) {
        addMessage(" ya lo sabia bro :/ ", "bot");
        document.getElementById("inputUser").disabled = true;
    } else if(resp.includes("no")) {
        noCount++;
        if(noCount == 1) addMessage(" COMO QUE NO TE VA A GUSTAR WE ", "bot");
        else if(noCount == 2) addMessage(" COMO QUE NO :V ", "bot");
        else if(noCount == 3 || noCount == 4) addMessage(" Mentiroso ", "bot");
        else if(noCount == 5 && !dedoMostrado) {
            addMessage("🖕🖕🖕🖕🖕🖕", "bot");
            dedoMostrado = true;
        } else if(noCount == 6 && !mentirosoDeMierdDone) {
            addMessage(" Mentiroso de mierd ", "bot");
            mentirosoDeMierdDone = true;
        } else addMessage(" Mentiroso ", "bot");
    } else {
        addMessage(" NO ENTENDI, SOY CIEGO WE ", "bot");
    }

    document.getElementById("inputUser").value = "";
}
</script>

</body>
</html>
